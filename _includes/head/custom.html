{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Nav: separate "extra" tabs + Resources hover dropdown; sidebar CV button -->
<style>
.greedy-nav .masthead__menu-item.nav-extra > a { color:#8a8a8a; }
.greedy-nav .masthead__menu-item.nav-extra > a:hover { color:inherit; }
.greedy-nav .masthead__menu-item.nav-extra-first { margin-left:1.4rem; border-left:1px solid #dcdcdc; padding-left:1.1rem; }
.greedy-nav .masthead__menu-item.has-sub { position:relative; }
.greedy-nav .submenu{ display:none; position:absolute; left:0; top:100%; min-width:11rem; z-index:40; margin:0; padding:.3rem 0;
  list-style:none; background:#fff; border:1px solid #e4e4e4; border-radius:6px; box-shadow:0 8px 22px rgba(0,0,0,.13); }
.greedy-nav .masthead__menu-item.has-sub:hover .submenu,
.greedy-nav .masthead__menu-item.has-sub:focus-within .submenu{ display:block; }
.greedy-nav .submenu li{ margin:0; }
.greedy-nav .submenu a{ display:block; padding:.4rem .9rem; font-size:.82rem; white-space:nowrap; color:#494e52; }
.greedy-nav .submenu a:hover{ background:rgba(33,145,140,.12); color:#13716b; }
.author__cv{ margin:.3rem 0 .2rem; }
.author__cv a{ font-size:.7rem; }
html[data-theme="dark"] .greedy-nav .submenu{ background:#252a33; border-color:#3a3f48; }
html[data-theme="dark"] .greedy-nav .submenu a{ color:#cfd3d8; }
html[data-theme="dark"] .greedy-nav .masthead__menu-item.nav-extra-first{ border-left-color:#3a3f48; }
</style>

<!-- end custom head snippets -->
